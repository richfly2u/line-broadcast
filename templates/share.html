<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>加我榮哥為好友</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Noto Sans TC",sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:12px;
  background:#0b0e14;
  background-attachment: fixed;
}

/* Glass card */
.card{
  background: rgba(18,22,28,0.88) url('/static/bg_texture.jpg') center / cover;
  background-blend-mode: soft-light;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:20px;
  padding:18px 20px 14px;
  max-width:340px;width:100%;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 24px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* Card border - subtle */
.card::after{
  content:'';
  position:absolute;inset:-1px;
  border-radius:21px;
  background:rgba(255,255,255,0.06);
  z-index:-1;
}

/* Avatar with glow */
.avatar-wrap{
  position:relative;
  width:60px;height:60px;margin:0 auto 6px;
}
.avatar-glow{
  position:absolute;inset:-5px;border-radius:50%;
  background:conic-gradient(#ff0066, #ff6600, #ffcc00, #00cc44, #0099ff, #6633ff, #ff0066);
  opacity:0.4;
  animation:glow-breathe 3s ease-in-out infinite;
}
@keyframes glow-breathe{
  0%,100%{opacity:0.35;transform:scale(0.95)}
  50%{opacity:0.65;transform:scale(1.08)}
}
.avatar-inner{
  position:relative;z-index:1;
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg, #0f141c, #1a2230);
  border:2px solid rgba(6,199,85,0.3);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  animation:inner-breathe 3s ease-in-out infinite;
}
@keyframes inner-breathe{
  0%,100%{transform:scale(0.95)}
  50%{transform:scale(1.05)}
}
.avatar-inner span{
  font-size:26px;line-height:1;filter:drop-shadow(0 2px 6px rgba(6,199,85,0.3));
  animation:crown-breathe 3s ease-in-out infinite;
}
@keyframes crown-breathe{
  0%,100%{transform:scale(0.92)}
  50%{transform:scale(1.06)}
}

h1{
  font-size:18px;font-weight:700;color:#fff;margin-bottom:1px;
  letter-spacing:-0.3px;
}
.subtitle{
  font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:10px;
}
.subtitle a{
  color:#06C755;font-weight:600;text-decoration:none;
}

/* Divider light */
.divider{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
}
.divider span{color:rgba(255,255,255,0.3);font-size:10px;white-space:nowrap}

/* QR box - glass */
.qr-box{
  background:rgba(255,255,255,0.03);
  border-radius:10px;padding:8px;margin-bottom:10px;
  border:1px solid rgba(255,255,255,0.06);
  transition:all 0.3s;
}
.qr-box:hover{
  background:rgba(255,255,255,0.06);
  border-color:rgba(6,199,85,0.2);
}
.qr-box img{width:110px;height:110px;display:block;margin:0 auto;border-radius:4px}
.qr-hint{
  font-size:10px;color:rgba(255,255,255,0.35);margin-top:4px;
  display:flex;align-items:center;justify-content:center;gap:4px;
}

/* Premium buttons */
.btn{
  display:block;width:100%;padding:10px 14px;border:none;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;
  transition:all 0.3s;position:relative;overflow:hidden;
}
.btn-primary{
  background:linear-gradient(135deg, #06C755, #00d85a);
  color:#fff;
  box-shadow:0 4px 20px rgba(6,199,85,0.3);
}
.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(6,199,85,0.4);
}
.btn-primary:active{transform:translateY(0)}

/* Badge */
.badge{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(255,102,0,0.1);
  color:#ff6600;font-size:10px;font-weight:600;
  padding:3px 10px;border-radius:14px;margin-bottom:6px;
  border:1px solid rgba(255,102,0,0.15);
}

.note{
  font-size:10px;color:rgba(255,255,255,0.2);margin-top:6px;line-height:1.4;
}

/* Stats line */
.stats{
  display:flex;justify-content:center;gap:16px;margin-bottom:10px;
}
.stat-item{text-align:center}
.stat-num{font-size:14px;font-weight:700;color:#fff}
.stat-label{font-size:9px;color:rgba(255,255,255,0.3);margin-top:1px}

@media(max-width:380px){
  .card{padding:14px 14px 12px;max-width:300px}
  .avatar-wrap{width:50px;height:50px}
  .avatar-inner{width:50px;height:50px}
  .avatar-inner span{font-size:22px}
  .qr-box img{width:90px;height:90px}
  h1{font-size:16px}
}
</style>
</head>
<body>

<div class="card">

  <div class="badge">🌟 榮哥好友限定</div>

  <div class="avatar-wrap">
    <div class="avatar-glow"></div>
    <div class="avatar-inner"><span>👑</span></div>
  </div>

  <h1>加我榮哥為好友</h1>
  <p class="subtitle">🔥 好友募集中 · <a href="https://line.me/R/ti/p/%40097hfnuw" target="_blank">立即加入</a></p>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-num">🥘</div>
      <div class="stat-label">素食饗宴</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">🎁</div>
      <div class="stat-label">好康趣聞</div>
    </div>
    <div class="stat-item">
      <div class="stat-num">📢</div>
      <div class="stat-label">活動通知</div>
    </div>
  </div>

  <div class="divider"><span>📱 掃碼加入</span></div>

  <div class="qr-box">
    <img src="/static/qr_friend.png" alt="QR Code">
    <div class="qr-hint">📸 LINE 掃描 QR Code</div>
  </div>

  <a href="https://line.me/R/ti/p/%40097hfnuw" class="btn btn-primary" target="_blank">
    💬 打開 LINE 加好友
  </a>

  <div class="note">
    加入後不打擾您 🙏<br>只在有重要消息時推播通知
  </div>
</div>

</body>
</html>
