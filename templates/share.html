<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加入好友</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px
}
.card{
  background:#fff;border-radius:24px;padding:40px 30px;max-width:400px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center
}
.avatar{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
  font-size:36px;color:#fff;font-weight:bold
}
h1{font-size:24px;color:#1a1a2e;margin-bottom:8px}
p{color:#666;font-size:15px;line-height:1.6;margin-bottom:24px}
.qr-box{
  background:#f5f5f5;border-radius:16px;padding:20px;margin-bottom:24px
}
.qr-box img{width:200px;height:200px;display:block;margin:0 auto}
.qr-box .hint{font-size:13px;color:#999;margin-top:10px}
.btn{
  display:block;width:100%;padding:16px;border:none;border-radius:12px;
  font-size:18px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center
}
.btn-primary{
  background:#06c755;color:#fff;margin-bottom:12px
}
.btn-primary:hover{background:#05b54b}
.btn-outline{
  background:transparent;color:#667eea;border:2px solid #667eea
}
.btn-outline:hover{background:#f0f0ff}
.note{font-size:13px;color:#aaa;margin-top:16px;line-height:1.4}
</style>
</head>
<body>
<div class="card">
  <div class="avatar">👤</div>
  <h1>加我好友 👋</h1>
  <p>追蹤我的動態、接收最新消息<br>我們保持聯絡！</p>
  <div class="qr-box">
    <img src="/static/qr_friend.png" alt="QR Code" onerror="this.style.display='none'">
    <div class="hint">📱 掃描 QR Code 加入好友</div>
  </div>
  <a href="https://line.me/R/ti/p/%40097hfnuw" class="btn btn-primary" target="_blank">
    💬 打開 LINE 加好友
  </a>
  <a href="https://line.me/R/ti/p/%40097hfnuw" class="btn btn-outline" target="_blank">
    🔗 或點此連結加入
  </a>
  <div class="note">
    加入後不會打擾您，<br>只有在有重要消息時才會推播通知 🙏
  </div>
</div>
</body>
</html>
