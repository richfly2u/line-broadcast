<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>選擇風格</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:#f5f5f5;padding:20px;text-align:center;
}
h1{font-size:22px;margin:20px 0 8px;color:#1a1a2e}
p{color:#666;font-size:14px;margin-bottom:24px}
.variants{display:flex;flex-direction:column;gap:24px;max-width:500px;margin:0 auto}
.card{
  border-radius:20px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.1);
  cursor:pointer;transition:transform 0.2s;background:#fff;
}
.card:hover{transform:scale(1.02)}
.card-label{
  padding:12px 16px;font-weight:600;font-size:15px;color:#333;
  background:#fafafa;border-bottom:1px solid #eee;
  display:flex;justify-content:space-between;align-items:center;
}
.card-label .badge{
  font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600;
}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-dark{background:#e8eaf6;color:#283593}
.card iframe{width:100%;height:600px;border:none;display:block}
.btn-group{margin-top:16px;display:flex;gap:12px;justify-content:center}
.btn{
  padding:14px 28px;border-radius:12px;font-size:16px;font-weight:600;
  border:none;cursor:pointer;text-decoration:none;color:#fff;flex:1;
}
.btn-green{background:#06C755}
.btn-dark{background:#2c3e50}
.btn:hover{opacity:0.9}
</style>
</head>
<body>
<h1>🎨 選擇您喜歡的風格</h1>
<p>點擊卡片查看完整設計，選好後我直接部署 🚀</p>

<div class="variants">
  <div class="card" onclick="window.open('/sketches/001-line-green/index.html','_blank')">
    <div class="card-label">
      🌿 ① LINE 綠清新風
      <span class="badge badge-green">清新親切</span>
    </div>
    <iframe src="/sketches/001-line-green/index.html"></iframe>
  </div>

  <div class="card" onclick="window.open('/sketches/002-premium-dark/index.html','_blank')">
    <div class="card-label">
      🌑 ② 精品暗黑風
      <span class="badge badge-dark">高級質感</span>
    </div>
    <iframe src="/sketches/002-premium-dark/index.html"></iframe>
  </div>
</div>

<div class="btn-group">
  <a href="https://line-broadcast-production.up.railway.app/sketches/001-line-green/index.html" class="btn btn-green" target="_blank">🌿 選 1</a>
  <a href="https://line-broadcast-production.up.railway.app/sketches/002-premium-dark/index.html" class="btn btn-dark" target="_blank">🌑 選 2</a>
</div>

<p style="margin-top:20px;font-size:13px;color:#999">👆 點按鈕可直接在手機看到完整效果</p>
</body>
</html>
