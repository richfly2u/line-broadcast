<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>加我榮哥為好友</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100dvh;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Noto Sans TC",sans-serif;
  display:flex;align-items:center;justify-content:center;padding:10px;
  background:#0b0e14;
}

/* Glass card */
.card{
  background: rgba(18,22,28,0.88) url('/static/bg_texture.jpg') center / cover;
  background-blend-mode: soft-light;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:18px;
  padding:14px 16px 10px;
  max-width:320px;width:100%;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 24px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  text-align:center;
  position:relative;
  overflow:hidden;
  flex:none;
}

/* Card border */
.card::after{
  content:'';position:absolute;inset:-1px;
  border-radius:19px;background:rgba(255,255,255,0.06);z-index:-1;
}

/* Avatar */
.avatar-wrap{
  position:relative;width:52px;height:52px;margin:0 auto 4px;
}
.avatar-glow{
  position:absolute;inset:-4px;border-radius:50%;
  background:conic-gradient(#ff0066,#ff6600,#ffcc00,#00cc44,#0099ff,#6633ff,#ff0066);
  opacity:0.4;animation:gb 3s ease-in-out infinite;
}
@keyframes gb{0%,100%{opacity:0.35;transform:scale(0.95)}50%{opacity:0.65;transform:scale(1.08)}}
.avatar-inner{
  position:relative;z-index:1;width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#0f141c,#1a2230);
  border:2px solid rgba(6,199,85,0.3);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  animation:ib 3s ease-in-out infinite;
}
@keyframes ib{0%,100%{transform:scale(0.95)}50%{transform:scale(1.05)}}
.avatar-inner span{
  font-size:22px;line-height:1;animation:cb 3s ease-in-out infinite;
}
@keyframes cb{0%,100%{transform:scale(0.92)}50%{transform:scale(1.06)}}

h1{font-size:16px;font-weight:700;color:#fff;margin-bottom:1px;letter-spacing:-0.3px}
.subtitle{font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:8px}
.subtitle a{color:#06C755;font-weight:600;text-decoration:none}

.badge{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(255,102,0,0.1);color:#ff6600;font-size:9px;font-weight:600;
  padding:2px 8px;border-radius:12px;margin-bottom:4px;
  border:1px solid rgba(255,102,0,0.15);
}

.divider{
  display:flex;align-items:center;gap:6px;margin-bottom:8px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent)}
.divider span{color:rgba(255,255,255,0.3);font-size:9px;white-space:nowrap}

.qr-box{
  background:rgba(255,255,255,0.03);border-radius:8px;padding:6px;margin-bottom:8px;
  border:1px solid rgba(255,255,255,0.06);
}
.qr-box img{width:95px;height:95px;display:block;margin:0 auto;border-radius:4px}
.qr-hint{font-size:9px;color:rgba(255,255,255,0.35);margin-top:3px}

.btn{
  display:block;width:100%;padding:8px 12px;border:none;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;
  transition:all 0.3s;
}
.btn-primary{
  background:linear-gradient(135deg,#06C755,#00d85a);color:#fff;
  box-shadow:0 4px 20px rgba(6,199,85,0.3);
}
.btn-primary:active{transform:translateY(0)}

.note{font-size:9px;color:rgba(255,255,255,0.2);margin-top:4px;line-height:1.3}

.stats{display:flex;justify-content:center;gap:14px;margin-bottom:8px}
.stat-item{text-align:center}
.stat-num{font-size:12px;font-weight:700;color:#fff}
.stat-label{font-size:8px;color:rgba(255,255,255,0.3);margin-top:0}
</style>
</head>
<body>
<div class="card">
  <div class="badge">🌟 榮哥好友限定</div>
  <div class="avatar-wrap">
    <div class="avatar-glow"></div>
    <div class="avatar-inner"><span>👑</span></div>
  </div>
  <h1>加我榮哥為好友</h1>
  <p class="subtitle">🔥 好友募集中 · <a href="https://line.me/R/ti/p/%40097hfnuw" target="_blank">立即加入</a></p>
  <div class="stats">
    <div class="stat-item"><div class="stat-num">🥘</div><div class="stat-label">素食饗宴</div></div>
    <div class="stat-item"><div class="stat-num">🎁</div><div class="stat-label">好康趣聞</div></div>
    <div class="stat-item"><div class="stat-num">📢</div><div class="stat-label">活動通知</div></div>
  </div>
  <div class="divider"><span>📱 掃碼加入</span></div>
  <div class="qr-box">
    <img src="/static/qr_friend.png" alt="QR Code">
    <div class="qr-hint">📸 LINE 掃描 QR Code</div>
  </div>
  <a href="https://line.me/R/ti/p/%40097hfnuw" class="btn btn-primary" target="_blank">💬 打開 LINE 加好友</a>
  <div class="note">加入後不打擾您 🙏<br>只在有重要消息時推播通知</div>
</div>
</body>
</html>
