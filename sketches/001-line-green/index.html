<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>加我榮哥為好友</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Noto Sans TC",sans-serif;
  background: #f0f6f0;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;
  background-image:radial-gradient(circle at 10% 20%, rgba(6,199,85,0.08) 0%, transparent 50%),
                   radial-gradient(circle at 90% 80%, rgba(6,199,85,0.06) 0%, transparent 50%);
}

.card{
  background:#fff;
  border-radius:28px;
  padding:48px 28px 36px;
  max-width:380px;width:100%;
  box-shadow:0 8px 40px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.02);
  text-align:center;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:6px;
  background:linear-gradient(90deg, #06C755, #00e061, #06C755);
}

/* Avatar */
.avatar-wrap{
  position:relative;
  width:96px;height:96px;margin:0 auto 12px;
}
.avatar-ring{
  width:96px;height:96px;border-radius:50%;
  background:linear-gradient(135deg, #06C755, #00e061);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(6,199,85,0.25);
  animation:pulse-ring 2.5s ease-in-out infinite;
}
@keyframes pulse-ring{
  0%,100%{box-shadow:0 4px 20px rgba(6,199,85,0.25)}
  50%{box-shadow:0 4px 35px rgba(6,199,85,0.45)}
}
.avatar-inner{
  width:86px;height:86px;border-radius:50%;
  background:#fff;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.avatar-inner span{
  font-size:40px;line-height:1;
}

h1{
  font-size:26px;font-weight:700;color:#1a1a2e;margin-bottom:4px;
  letter-spacing:-0.3px;
}
.subtitle{
  font-size:14px;color:#666;margin-bottom:28px;
}
.subtitle span{
  color:#06C755;font-weight:600;
}

/* Divider */
.divider{
  display:flex;align-items:center;gap:12px;margin-bottom:24px;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;background:#e8e8e8;
}
.divider span{color:#999;font-size:12px;white-space:nowrap}

/* QR */
.qr-box{
  background:#f9fbf9;border-radius:16px;padding:20px;margin-bottom:24px;
  border:1px solid #e8f0e8;
  transition:transform 0.2s;
}
.qr-box:hover{transform:scale(1.02)}
.qr-box img{width:180px;height:180px;display:block;margin:0 auto}
.qr-hint{
  font-size:13px;color:#888;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:4px;
}

/* Buttons */
.btn{
  display:block;width:100%;padding:17px 20px;border:none;border-radius:14px;
  font-size:17px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;
  transition:all 0.2s;
}
.btn-primary{
  background:#06C755;color:#fff;margin-bottom:12px;
  box-shadow:0 4px 15px rgba(6,199,85,0.35);
}
.btn-primary:hover{
  background:#05b54b;transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(6,199,85,0.45);
}
.btn-primary:active{transform:translateY(0)}
.btn-outline{
  background:transparent;color:#06C755;border:2px solid #06C755;
}
.btn-outline:hover{background:#f0faf3;transform:translateY(-1px)}
.btn-outline:active{transform:translateY(0)}

/* Tags / Badge */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  background:#f0faf3;color:#06C755;font-size:13px;font-weight:600;
  padding:6px 14px;border-radius:20px;margin-bottom:16px;
}

.note{
  font-size:12px;color:#aaa;margin-top:20px;line-height:1.6;
}

/* Floating decoration */
.deco{
  position:absolute;width:200px;height:200px;border-radius:50%;
  opacity:0.03;pointer-events:none;
}
.deco-1{top:-60px;right:-60px;background:#06C755}
.deco-2{bottom:-80px;left:-60px;background:#06C755}

/* Copy button */
.copy-wrap{
  margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;
}
.copy-link{
  font-size:12px;color:#06C755;background:#f0faf3;padding:6px 14px;border-radius:8px;
  text-decoration:none;font-weight:500;cursor:pointer;
  transition:all 0.2s;
}
.copy-link:hover{background:#dcf5e4}

@media(max-width:400px){
  .card{padding:36px 20px 28px}
  h1{font-size:22px}
}
</style>
</head>
<body>

<div class="card">
  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>

  <div class="badge">🌟 榮哥的好友專屬</div>

  <div class="avatar-wrap">
    <div class="avatar-ring">
      <div class="avatar-inner"><span>👑</span></div>
    </div>
  </div>

  <h1>加我榮哥為好友</h1>
  <p class="subtitle">🔥 LINE 好友募集中 · <span>立即加入</span></p>

  <div class="divider"><span>📱 掃碼加入</span></div>

  <div class="qr-box">
    <img src="/static/qr_friend.png" alt="QR Code">
    <div class="qr-hint">📸 用 LINE 掃描 QR Code</div>
  </div>

  <a href="https://line.me/R/ti/p/%40097hfnuw" class="btn btn-primary" target="_blank">
    💬 打開 LINE 加好友
  </a>
  <a href="https://line.me/R/ti/p/%40097hfnuw" class="btn btn-outline" target="_blank">
    🔗 複製連結加入
  </a>

  <div class="copy-wrap">
    <span class="copy-link" onclick="navigator.clipboard?.writeText('https://line.me/R/ti/p/%40097hfnuw');this.textContent='✅ 已複製';setTimeout(()=>this.textContent='📋 複製好友連結',1500)">📋 複製好友連結</span>
  </div>

  <div class="note">
    加入後不打擾您 🙏<br>只在有重要消息時推播通知
  </div>
</div>

</body>
</html>
